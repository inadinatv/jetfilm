name: IPTV Listelerini Guncelle

on:
  schedule:
    - cron: '0 0 * * *' # Her gün gece 00:00'da otomatik çalışır
  workflow_dispatch: # GitHub arayüzünden manuel tetiklemek için buton ekler

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gereksinimleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper

      - name: Botu Çalıştır (main.py)
        run: python main.py

      - name: Dosyaları GitHub'a Yükle (Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "M3U Listeleri güncellendi: $(date +'%Y-%m-%d')"
          git push
